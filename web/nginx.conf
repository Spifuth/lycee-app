server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Avatar uploads — bump above nginx default 1 Mo (must match API MAX_BYTES).
    client_max_body_size 5M;

    # Generate relative redirects (e.g. /accueil → /accueil/). Otherwise nginx
    # would emit absolute redirects including its internal port 8080, which is
    # not exposed publicly via Traefik — browsers then hit a dead port and 404.
    absolute_redirect off;
    port_in_redirect off;

    # Static assets — long cache
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # API proxy to the FastAPI service on the internal network.
    # `^~` lui donne la priorité sur les regex locations (sinon /api/foo.png
    # serait capturé par la regex \.png$ des assets statiques → 404).
    location ^~ /api/ {
        proxy_pass http://lycee-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # Admin pages (server-rendered by the API, Basic Auth)
    # `^~` priorité sur la regex pour éviter capture par /\.(css|js|png|…)$/
    location ^~ /admin {
        proxy_pass http://lycee-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # DiceBear avatars (self-hosted container, exposed via this hostname)
    location ^~ /dicebear/ {
        proxy_pass http://lycee-dicebear:3000/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_pragma;
        # Cache long: avatars are deterministic from the seed
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Astro static-output: any unknown path falls back to its directory's index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
